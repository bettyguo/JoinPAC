# Default configuration for PAC-CE experiments
benchmark:
  name: job
  data_dir: benchmarks/data
  num_tables: 21
  num_queries: 113
  scale_factor: 1

model:
  architecture: mscn
  num_layers: 5
  hidden_dim: 256
  learning_rate: 0.001
  batch_size: 128
  epochs: 100
  dropout: 0.1

experiment:
  num_runs: 5
  warmup_runs: 3
  seed: 42
  confidence_threshold: 0.3
  drift_threshold: 0.45
  calibration_constant: 2.3
  reporting: "median with 95% CI over 5 runs"

hybrid:
  confidence_threshold: 0.3
  sigma_multiplier: 1.0
  it_bound_type: safebound
  fallback_strategy: geometric_mean

output_dir: results
log_level: INFO
